<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Live kerabat Toge </title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:#000;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:#081426;
display:flex;
flex-direction:column;
border-right:1px solid #16263f;
}

.logo{
padding:20px;
font-size:24px;
font-weight:bold;
text-align:center;
color:white;
border-bottom:1px solid #16263f;
}

.search{
padding:12px;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
}

.channels{
flex:1;
overflow-y:auto;
}

.channel{
padding:12px;
cursor:pointer;
color:white;
border-bottom:1px solid rgba(255,255,255,.05);
}

.channel:hover{
background:#16304f;
}

.channel.active{
background:#2563eb;
}

.player{
flex:1;
display:flex;
flex-direction:column;
}

.video-container{
flex:1;
background:#000;
}

video{
width:100%;
height:100%;
background:#000;
}

.status{
background:#081426;
padding:15px;
color:white;
font-size:18px;
}

.loading{
padding:20px;
text-align:center;
color:white;
}

@media(max-width:768px){

.wrapper{
flex-direction:column;
}

.sidebar{
width:100%;
height:40%;
}

.player{
height:60%;
}

}

</style>
</head>
<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">
LIVE TV
</div>

<div class="search">
<input
type="text"
id="search"
placeholder="Cari channel...">
</div>

<div
class="channels"
id="channels">

<div class="loading">
Loading playlist...
</div>

</div>

</div>

<div class="player">

<div class="video-container">

<video
id="video"
controls
autoplay
muted
playsinline>
</video>

</div>

<div
class="status"
id="status">

Loading...

</div>

</div>

</div>

<script>

const PLAYLIST_URL =
'https://playlist.kerabattoge.workers.dev/playlist';

let channels = [];
let hls;

const video =
document.getElementById('video');

const channelBox =
document.getElementById('channels');

const search =
document.getElementById('search');

const status =
document.getElementById('status');

async function loadPlaylist(){

try{

const response =
await fetch(PLAYLIST_URL);

const text =
await response.text();

parsePlaylist(text);

}catch(e){

status.innerText =
'Playlist gagal dimuat';

console.error(e);

}

}

function parsePlaylist(text){

channels = [];

const lines =
text.split('\n');

let currentName = '';

for(const raw of lines){

const line = raw.trim();

if(line.startsWith('#EXTINF')){

currentName =
line.split(',').pop();

}

else if(line.startsWith('http')){

channels.push({

name:currentName,
url:line

});

}

}

renderChannels(channels);

if(channels.length){

play(channels[0]);

}

}

function renderChannels(data){

channelBox.innerHTML='';

data.forEach(channel=>{

const div =
document.createElement('div');

div.className =
'channel';

div.textContent =
channel.name;

div.onclick=()=>{

document
.querySelectorAll('.channel')
.forEach(c=>
c.classList.remove('active'));

div.classList.add('active');

play(channel);

};

channelBox.appendChild(div);

});

}

function play(channel){

status.textContent =
channel.name;

if(hls){

hls.destroy();

}

if(Hls.isSupported()){

hls = new Hls({
enableWorker:true,
lowLatencyMode:true
});

hls.loadSource(channel.url);

hls.attachMedia(video);

hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{
video.play().catch(()=>{});
}
);

}else{

video.src =
channel.url;

}

}

search.addEventListener(
'input',
()=>{

const keyword =
search.value.toLowerCase();

const filtered =
channels.filter(c=>
c.name.toLowerCase()
.includes(keyword)
);

renderChannels(filtered);

}
);

loadPlaylist();

</script>

</body>
</html>
